              name: Governance Framework 2024
              description: Annual governance assessment - revised
              versionYear: 2024
              sections:
                - id: 01KKVDHCYB60J81NAR62T4DEMP
                  title: Section 1
                  description: Optional section description
                  position: 1
                  questions:
                    - id: 01KKVDHCYN6F1QW4K71RHJ2TRQ
                      text: Does the company have a code of conduct?
                      statutoryReference: ISO 37001
                      evidence: Document upload
                      requiredEvidence: true
                      commentRequired: false
                      position: 1
                    - id: 01KMDWEB1HVQQ1E95SCNBJ2F01
                      text: Are conflicts of interest declared and documented?
                      statutoryReference: CAMA 2020
                      evidence: Conflict register
                      requiredEvidence: true
                      commentRequired: false
                      position: 2
                    - text: Is board performance externally evaluated every 2 years?
                      statutoryReference: NCCG 2018
                      evidence: External evaluation report
                      requiredEvidence: true
                      commentRequired: true
                      position: 3
                - title: Section 3 - Compliance Monitoring
                  description: Regulatory compliance and tracking
                  position: 2
                  questions:
                    - text: Is there a compliance calendar approved by management?
                      statutoryReference: SEC Code
                      evidence: Compliance calendar
                      requiredEvidence: true
                      commentRequired: false
                      position: 1
                    - text: Are compliance breaches escalated to the board?
                      statutoryReference: NCCG 2018
                      evidence: Board/committee minutes
                      requiredEvidence: true
                      commentRequired: true
