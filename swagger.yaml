openapi: 3.0.0
info:
  title: dgoval backoffice admin
  version: 1.0.0
  description: ''
servers:
  - url: '{{DGOVAL_BASE_URL}}'
paths:
  /api/backoffice/auth/signin:
    post:
      tags:
        - Backoffice Auth
      summary: Backoffice login
      operationId: backofficeSignin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BackofficeSigninRequest'
      responses:
        '200':
          description: Login successful
          headers:
            Set-Cookie:
              schema:
                type: string
                example: refreshToken=...; HttpOnly; Path=/; Secure; SameSite=Strict
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
                  userId:
                    type: string
                  backofficeRole:
                    type: string
                    enum: [admin, client_manager, content_manager, viewer]
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                message: Invalid email or password
                data:
                  captchaRequired: true

  /api/backoffice/auth/signup:
    post:
      tags:
        - Backoffice Auth
      summary: Bootstrap signup (first platform admin)
      description: One-time signup when no backoffice users exist. No auth required.
      operationId: backofficeSignup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BackofficeSignupRequest'
      responses:
        '201':
          description: Platform admin created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      userId:
                        type: string
                      email:
                        type: string
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/backoffice/auth/refresh-token:
    post:
      tags:
        - Backoffice Auth
      summary: Refresh access token
      operationId: backofficeRefreshToken
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: New tokens
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
                  backofficeRole:
                    type: string

  /api/backoffice/auth/forgot-password:
    post:
      tags:
        - Backoffice Auth
      summary: Request password reset OTP
      operationId: backofficeForgotPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: If user exists, email will be sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string

  /api/backoffice/auth/verify-reset-password:
    post:
      tags:
        - Backoffice Auth
      summary: Verify OTP for password reset
      operationId: backofficeVerifyResetPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, otp]
              properties:
                email:
                  type: string
                  format: email
                otp:
                  type: string
      responses:
        '201':
          description: OTP verified successfully
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/backoffice/auth/reset-password:
    post:
      tags:
        - Backoffice Auth
      summary: Reset password with verified OTP
      description: OTP must have been verified within last 5 minutes via verify-reset-password.
      operationId: backofficeResetPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, newPassword]
              properties:
                email:
                  type: string
                  format: email
                newPassword:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Password reset successfully
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/backoffice/auth/accept-invite:
    post:
      tags:
        - Backoffice Auth
      summary: Accept invite and set password
      operationId: backofficeAcceptInvite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, newPassword]
              properties:
                token:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
                password:
                  type: string
                  description: Alias for newPassword
      parameters:
        - in: query
          name: token
          schema:
            type: string
          description: Invite token (alternative to body)
      responses:
        '200':
          description: Account activated

  /api/backoffice/dashboard:
    get:
      tags:
        - Backoffice Dashboard
      summary: Get dashboard overview
      operationId: backofficeGetDashboard
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: evaluationsLimit
          schema:
            type: integer
            default: 10
        - in: query
          name: clientsLimit
          schema:
            type: integer
            default: 10
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: companyId
          schema:
            type: string
      responses:
        '200':
          description: Dashboard data

  /api/backoffice/dashboard/metrics:
    get:
      tags:
        - Backoffice Dashboard
      summary: Get dashboard metrics
      operationId: backofficeGetMetrics
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Metrics data

  /api/backoffice/dashboard/recent-evaluations:
    get:
      tags:
        - Backoffice Dashboard
      summary: Get recent evaluations
      operationId: backofficeGetRecentEvaluations
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: companyId
          schema:
            type: string
        - in: query
          name: sortBy
          schema:
            type: string
            default: createdAt
        - in: query
          name: sortOrder
          schema:
            type: string
            enum: [asc, desc]
      responses:
        '200':
          description: Recent evaluations list

  /api/backoffice/dashboard/recent-clients:
    get:
      tags:
        - Backoffice Dashboard
      summary: Get recently added clients
      operationId: backofficeGetRecentClients
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
        - in: query
          name: sortOrder
          schema:
            type: string
            enum: [asc, desc]
      responses:
        '200':
          description: Recent clients list

  /api/backoffice/users:
    get:
      tags:
        - Backoffice User Management
      summary: List backoffice users
      operationId: backofficeListUsers
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: role
          schema:
            type: string
            enum: [admin, client_manager, content_manager, viewer]
        - in: query
          name: status
          schema:
            type: string
            enum: [invited, active, deactivated]
        - in: query
          name: sortBy
          schema:
            type: string
            enum: [asc, desc]
      responses:
        '200':
          description: Paginated users list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      users:
                        type: array
                        items:
                          type: object
                          properties:
                            backofficeUserId:
                              type: string
                            userId:
                              type: string
                            firstName:
                              type: string
                            lastName:
                              type: string
                            email:
                              type: string
                            role:
                              type: string
                            status:
                              type: string
                            invitedAt:
                              type: string
                              format: date-time
                            activatedAt:
                              type: string
                              format: date-time
                      total:
                        type: integer
                      page:
                        type: integer
                      limit:
                        type: integer

    post:
      tags:
        - Backoffice User Management
      summary: Invite backoffice user (Admin only)
      operationId: backofficeInviteUser
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [firstName, lastName, email, role]
              properties:
                firstName:
                  type: string
                lastName:
                  type: string
                email:
                  type: string
                  format: email
                role:
                  type: string
                  enum: [admin, client_manager, content_manager, viewer]
                backofficeLoginUrl:
                  type: string
                  description: Base URL for accept-invite link
      responses:
        '201':
          description: User invited
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      backofficeUserId:
                        type: string
                      userId:
                        type: string
                      email:
                        type: string
                      role:
                        type: string
                      status:
                        type: string

  /api/backoffice/users/{backofficeUserId}/role:
    patch:
      tags:
        - Backoffice User Management
      summary: Update user role (Admin only)
      operationId: backofficeUpdateUserRole
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: backofficeUserId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [admin, client_manager, content_manager, viewer]
      responses:
        '200':
          description: Role updated

  /api/backoffice/users/{backofficeUserId}/deactivate:
    post:
      tags:
        - Backoffice User Management
      summary: Deactivate user (Admin only)
      operationId: backofficeDeactivateUser
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: backofficeUserId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User deactivated

  /api/backoffice/users/{backofficeUserId}/reactivate:
    post:
      tags:
        - Backoffice User Management
      summary: Reactivate user (Admin only)
      operationId: backofficeReactivateUser
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: backofficeUserId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User reactivated

  /api/backoffice/users/{backofficeUserId}/resend-invite:
    post:
      tags:
        - Backoffice User Management
      summary: Resend invite email (Admin only)
      operationId: backofficeResendInvite
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: backofficeUserId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                backofficeLoginUrl:
                  type: string
      responses:
        '200':
          description: Invite resent

components:
  schemas:
    BackofficeSigninRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    BackofficeSignupRequest:
      type: object
      required: [firstName, lastName, email, password]
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        password:
          type: string

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
